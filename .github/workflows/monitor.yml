name: Signal Monitor
on:
  schedule:
    - cron: '*/5 * * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore signals
        uses: actions/cache@v4
        with:
          path: signals.json
          key: signals-${{ github.run_id }}
          restore-keys: signals-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas yfinance

      - name: Run monitor
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: python monitor_signals.py

      - name: Save signals
        uses: actions/cache/save@v4
        if: always()
        with:
          path: signals.json
          key: signals-${{ github.run_id }}
