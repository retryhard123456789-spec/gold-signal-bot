name: Signal Monitor
on:
  schedule:
    - cron: '0 */6 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4

      - name: Restore signals
        uses: actions/cache@v4
        with:
          path: signals.json
          key: signals-${{ github.run_id }}
          restore-keys: signals-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas yfinance

      - name: Run monitor loop
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          END=$((SECONDS + 21300))
          while [ $SECONDS -lt $END ]; do
            python monitor_signals.py
            sleep 15
          done

      - name: Save signals
        uses: actions/cache/save@v4
        if: always()
        with:
          path: signals.json
          key: signals-${{ github.run_id }}
